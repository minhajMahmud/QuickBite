name: quickbite_mobile
description: "A luxury food delivery mobile application built with Flutter."
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & Providers
  provider: ^6.0.0
  riverpod: ^2.4.0
  flutter_riverpod: ^2.4.0
  
  # HTTP & Networking
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Navigation & Routing
  go_router: ^11.0.0
  
  # UI & Design
  google_fonts: ^6.0.0
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # Animations
  flutter_animate: ^4.2.0
  lottie: ^2.4.0
  
  # Utilities
  intl: ^0.20.2
  uuid: ^4.0.0
  logger: ^2.0.0
  equatable: ^2.0.0
  crypto: ^3.0.3
  
  # Charts
  fl_chart: ^0.63.0
  
  # Image Picking
  image_picker: ^1.0.0
  url_launcher: ^6.3.1
  
  # Maps (optional for delivery tracking)
  google_maps_flutter: ^2.9.0
  
  # Payment Processing (placeholder)
  # flutter_stripe: ^8.0.0
  
  # Notifications
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  firebase_messaging: ^15.2.10
  firebase_data_connect: ^0.1.4
  
  # Bottom Navigation
  convex_bottom_bar: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    
