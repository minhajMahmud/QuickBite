services:
  # Development services
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "8090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: quickbiteserver
      POSTGRES_PASSWORD: "b6UkQpPw-RBw6AfKEn4RhkDldjSLleu4"
    volumes:
      - quickbiteserver_data:/var/lib/postgresql/data

  redis:
    image: redis:6.2.6
    ports:
      - "8091:6379"
    command: redis-server --requirepass "HBo3LsauAiHkJzqyT3UcIKS4UyHH40Ve"
    environment:
      - REDIS_REPLICATION_MODE=master

  # Test services
  postgres_test:
    image: pgvector/pgvector:pg16
    ports:
      - "9090:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: quickbiteserver_test
      POSTGRES_PASSWORD: "Wcn8Z_sxN096mAd_vM9b8yy57tr0ywuF"
    volumes:
      - quickbiteserver_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:6.2.6
    ports:
      - "9091:6379"
    command: redis-server --requirepass "teBZBLVz4WgcMZnKYW0MGWRJNxoiml-6"
    environment:
      - REDIS_REPLICATION_MODE=master

volumes:
  quickbiteserver_data:
  quickbiteserver_test_data:
